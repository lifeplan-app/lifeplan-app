<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg2)"/>

  <!-- Decorative circles -->
  <circle cx="1050" cy="100" r="200" fill="rgba(255,255,255,0.06)"/>
  <circle cx="1100" cy="500" r="150" fill="rgba(255,255,255,0.06)"/>

  <!-- Bar chart decoration (right side) -->
  <rect x="700" y="320" width="60" height="200" rx="6" fill="rgba(255,255,255,0.12)"/>
  <rect x="780" y="240" width="60" height="280" rx="6" fill="rgba(255,255,255,0.18)"/>
  <rect x="860" y="280" width="60" height="240" rx="6" fill="rgba(255,255,255,0.14)"/>
  <rect x="940" y="200" width="60" height="320" rx="6" fill="rgba(255,255,255,0.22)"/>
  <rect x="1020" y="260" width="60" height="260" rx="6" fill="rgba(255,255,255,0.16)"/>
  <rect x="1100" y="160" width="60" height="360" rx="6" fill="rgba(255,255,255,0.28)"/>

  <!-- Left content -->
  <circle cx="120" cy="120" r="52" fill="rgba(255,255,255,0.15)"/>
  <text x="120" y="138" font-family="sans-serif" font-size="48" text-anchor="middle">💰</text>

  <!-- Title -->
  <text x="100" y="240" font-family="'Hiragino Sans', 'Yu Gothic', sans-serif"
    font-size="72" font-weight="900" fill="white" letter-spacing="-1">支出管理アプリ</text>

  <!-- Tagline -->
  <text x="100" y="310" font-family="'Hiragino Sans', 'Yu Gothic', sans-serif"
    font-size="34" fill="rgba(255,255,255,0.8)" letter-spacing="2">毎月の支出を4領域で見える化する</text>

  <!-- Feature chips -->
  <rect x="100" y="370" width="200" height="44" rx="22" fill="rgba(255,255,255,0.18)"/>
  <text x="200" y="398" font-family="sans-serif" font-size="22" fill="white" text-anchor="middle">CSVインポート対応</text>

  <rect x="316" y="370" width="170" height="44" rx="22" fill="rgba(255,255,255,0.18)"/>
  <text x="401" y="398" font-family="sans-serif" font-size="22" fill="white" text-anchor="middle">予算 vs 実績管理</text>

  <rect x="502" y="370" width="180" height="44" rx="22" fill="rgba(255,255,255,0.18)"/>
  <text x="592" y="398" font-family="sans-serif" font-size="22" fill="white" text-anchor="middle">ライフプラン連携</text>

  <!-- Divider + note -->
  <rect x="100" y="445" width="560" height="2" fill="rgba(255,255,255,0.2)"/>
  <text x="100" y="500" font-family="'Hiragino Sans', 'Yu Gothic', sans-serif"
    font-size="26" fill="rgba(255,255,255,0.65)">MF・Zaim 対応。データはブラウザ内に保存。完全無料。</text>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="rgba(0,0,0,0.2)"/>
  <text x="600" y="617" font-family="sans-serif" font-size="20" fill="rgba(255,255,255,0.5)" text-anchor="middle">lifeplan.app/spending</text>
</svg>
