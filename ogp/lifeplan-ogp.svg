<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a3a6e"/>
      <stop offset="100%" stop-color="#1a56a0"/>
    </linearGradient>
    <linearGradient id="chartGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.15)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative grid lines -->
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <line x1="0" y1="330" x2="1200" y2="330" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <line x1="0" y1="240" x2="1200" y2="240" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Chart area fill -->
  <polygon points="640,430 720,380 800,340 880,270 960,220 1040,180 1120,150 1200,130 1200,520 640,520"
    fill="url(#chartGrad)"/>

  <!-- Chart line -->
  <polyline points="640,430 720,380 800,340 880,270 960,220 1040,180 1120,150 1200,130"
    fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="640,430 720,380 800,340 880,270 960,220 1040,180 1120,150 1200,130"
    fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Left content -->
  <!-- App icon: compass -->
  <circle cx="120" cy="120" r="52" fill="rgba(255,255,255,0.2)"/>
  <circle cx="120" cy="120" r="38" fill="none" stroke="rgba(255,255,255,0.8)" stroke-width="3"/>
  <!-- Compass needle N (white) -->
  <polygon points="120,88 126,120 120,115 114,120" fill="white"/>
  <!-- Compass needle S (teal) -->
  <polygon points="120,152 126,120 120,125 114,120" fill="#00C4A0"/>
  <!-- Center dot -->
  <circle cx="120" cy="120" r="5" fill="white"/>

  <!-- Title -->
  <text x="100" y="240" font-family="'Hiragino Sans', 'Yu Gothic', sans-serif"
    font-size="72" font-weight="900" fill="white" letter-spacing="-1">みらいコンパス</text>

  <!-- Tagline -->
  <text x="100" y="310" font-family="'Hiragino Sans', 'Yu Gothic', sans-serif"
    font-size="34" fill="rgba(255,255,255,0.75)" letter-spacing="2">人生100年を、自分の手で設計する</text>

  <!-- Feature chips -->
  <rect x="100" y="370" width="190" height="44" rx="22" fill="rgba(255,255,255,0.15)"/>
  <text x="195" y="398" font-family="sans-serif" font-size="22" fill="white" text-anchor="middle">老後シミュレーション</text>

  <rect x="306" y="370" width="160" height="44" rx="22" fill="rgba(255,255,255,0.15)"/>
  <text x="386" y="398" font-family="sans-serif" font-size="22" fill="white" text-anchor="middle">資産・収支管理</text>

  <rect x="482" y="370" width="130" height="44" rx="22" fill="rgba(255,255,255,0.15)"/>
  <text x="547" y="398" font-family="sans-serif" font-size="22" fill="white" text-anchor="middle">完全無料</text>

  <!-- Free badge -->
  <rect x="100" y="445" width="540" height="2" fill="rgba(255,255,255,0.2)"/>
  <text x="100" y="500" font-family="'Hiragino Sans', 'Yu Gothic', sans-serif"
    font-size="26" fill="rgba(255,255,255,0.6)">データはすべてブラウザ内に保存。登録不要でずっと無料。</text>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="rgba(0,0,0,0.25)"/>
  <text x="600" y="617" font-family="sans-serif" font-size="20" fill="rgba(255,255,255,0.5)" text-anchor="middle">app.lifeplan-app.net</text>
</svg>
